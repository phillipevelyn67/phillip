<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
        }

        .upload-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background-color: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background-color: #e8ebff;
            transform: scale(1.02);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-area small {
            color: #999;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .gallery-item {
            position: relative;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-info {
            padding: 15px;
            background: white;
        }

        .gallery-item-info p {
            color: #666;
            font-size: 0.9em;
            margin: 5px 0;
            word-break: break-word;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            opacity: 0;
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 1);
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            background: white;
            border-radius: 10px;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .upload-area {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 Picture Gallery</h1>
            <p>Share and explore beautiful moments</p>
        </header>

        <div class="upload-section">
            <h2>Upload Your Photos</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p>Drag and drop your images here</p>
                <small>or click to select files</small>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>
        </div>

        <div id="galleryContainer">
            <div class="empty-state">
                <p>No pictures yet. Start uploading to create your gallery!</p>
            </div>
        </div>

        <footer>
            <p>&copy; 2024 Picture Gallery. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const galleryContainer = document.getElementById('galleryContainer');
        let pictures = JSON.parse(localStorage.getItem('pictures')) || [];

        // Upload area click
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const picture = {
                            id: Date.now() + Math.random(),
                            src: e.target.result,
                            name: file.name,
                            date: new Date().toLocaleDateString()
                        };
                        pictures.unshift(picture);
                        savePictures();
                        renderGallery();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function savePictures() {
            localStorage.setItem('pictures', JSON.stringify(pictures));
        }

        function deletePicture(id) {
            pictures = pictures.filter(pic => pic.id !== id);
            savePictures();
            renderGallery();
        }

        function renderGallery() {
            if (pictures.length === 0) {
                galleryContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No pictures yet. Start uploading to create your gallery!</p>
                    </div>
                `;
                return;
            }

            galleryContainer.innerHTML = `
                <div class="gallery">
                    ${pictures.map(pic => `
                        <div class="gallery-item">
                            <img src="${pic.src}" alt="${pic.name}">
                            <button class="delete-btn" onclick="deletePicture(${pic.id})">✕</button>
                            <div class="gallery-item-info">
                                <p><strong>${pic.name}</strong></p>
                                <p>${pic.date}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initial render
        renderGallery();
    </script>
</body>
</html>
